<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="54%">
      <stop offset="0" stop-color="#39ff7e" stop-opacity="0.20"/>
      <stop offset="62%" stop-color="#17b333" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#17b333" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lane" x1="226" y1="675" x2="800" y2="319" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#125f2d"/>
      <stop offset="0.55" stop-color="#20b84c"/>
      <stop offset="1" stop-color="#0c7a25"/>
    </linearGradient>
    <linearGradient id="chrome" x1="214" y1="236" x2="810" y2="788" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fff9"/>
      <stop offset="1" stop-color="#e9f8ed"/>
    </linearGradient>
    <linearGradient id="hexFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2faf4a"/>
      <stop offset="1" stop-color="#0c7a25"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.125 0 0 0 0 0.600 0 0 0 0 0.290 0 0 0 0.34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="#ffffff"/>
    <ellipse cx="512" cy="512" rx="436" ry="436" fill="url(#halo)"/>
    <g id="browser-window" transform="translate(168 218)">
      <rect x="0" y="0" width="688" height="558" rx="86" fill="url(#chrome)" stroke="#125f2d" stroke-opacity="0.42" stroke-width="24"/>
      <line x1="28" y1="124" x2="660" y2="124" stroke="#125f2d" stroke-opacity="0.30" stroke-width="18" stroke-linecap="round"/>
      <circle cx="91" cy="67" r="18" fill="#20b84c" opacity="0.88"/>
      <circle cx="151" cy="67" r="18" fill="#64d882" opacity="0.76"/>
      <circle cx="211" cy="67" r="18" fill="#0c7a25" opacity="0.82"/>
    </g>

    <path id="lane-path" d="M250 652 C 332 511, 428 470, 516 504 C 614 542, 673 486, 769 342" fill="none" stroke="#ffffff" stroke-opacity="0.96" stroke-width="96" stroke-linecap="round"/>
    <path d="M250 652 C 332 511, 428 470, 516 504 C 614 542, 673 486, 769 342" fill="none" stroke="url(#lane)" stroke-width="58" stroke-linecap="round" filter="url(#softGlow)"/>
    <path d="M250 652 C 332 511, 428 470, 516 504 C 614 542, 673 486, 769 342" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="14" stroke-linecap="round"/>

    <g id="hex-node" transform="translate(477 470)">
      <polygon points="35,0 70,20 70,60 35,80 0,60 0,20" fill="url(#hexFill)" stroke="#0a2f18" stroke-width="8" stroke-linejoin="round"/>
      <polygon points="35,14 57,27 57,53 35,66 13,53 13,27" fill="#ffffff" fill-opacity="0.28"/>
    </g>
  </g>
</svg>
