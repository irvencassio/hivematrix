<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HiveMatrix</title>
<style>
  html, body { margin: 0; height: 100%; background: #0d1117; color: #e6edf3;
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .wrap { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .logo { font-size: 22px; font-weight: 700; color: #d9a441; letter-spacing: 1px; }
  .status { color: #8b949e; }
  .spinner { width: 26px; height: 26px; border: 3px solid #2d333b; border-top-color: #d9a441;
    border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  a { color: #58a6ff; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">HiveMatrix</div>
  <div class="spinner"></div>
  <div class="status" id="status">Connecting to daemon…</div>
</div>
<script>
  // The daemon (launchd-supervised) serves the operator console. We wait for it
  // to be healthy, then navigate the webview to it — same-origin, so the
  // console's relative REST/SSE calls work without CORS.
  const DAEMON = "http://127.0.0.1:3747";
  const statusEl = document.getElementById("status");
  let attempts = 0;

  async function tryConnect() {
    attempts++;
    try {
      const r = await fetch(DAEMON + "/health", { cache: "no-store" });
      if (r.ok) {
        statusEl.textContent = "Loading console…";
        window.location.replace(DAEMON + "/console");
        return;
      }
    } catch (e) { /* daemon not up yet */ }
    if (attempts <= 3) statusEl.textContent = "Connecting to daemon…";
    else statusEl.textContent = "Waiting for the HiveMatrix daemon to start… (attempt " + attempts + ")";
    setTimeout(tryConnect, 1500);
  }
  tryConnect();
</script>
</body>
</html>
