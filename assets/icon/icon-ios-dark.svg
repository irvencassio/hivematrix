<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- iOS 17+ dark appearance: art on a TRANSPARENT background; the system
       composites it over its own dark material. Same green hive-flower identity. -->
  <defs>
